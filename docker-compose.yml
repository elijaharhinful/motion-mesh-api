version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: motionmesh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-motionmesh}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-motionmesh}
      POSTGRES_DB: ${DB_NAME:-motionmesh}
    ports:
      - '${DB_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-motionmesh}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: motionmesh_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-motionmesh}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-motionmesh}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: motionmesh_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-motionmesh}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-motionmesh_secret}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
